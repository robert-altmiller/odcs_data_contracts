name: Deploy Databricks Contracts Workflows

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy Data Contracts with Databricks Asset Bundles (DABS)
    runs-on: ubuntu-latest
    
    env:
      DATABRICKS_CFG_PATH: "/home/runner/.databrickscfg"

    steps:
      - name: checkout-repo
        uses: actions/checkout@v3

      - name: setup-python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Databricks CLI
        run: pip install databricks

      - name: Set up .databrickscfg
        run: |
          echo "Creating $DATABRICKS_CFG_PATH"
          CONFIG_FILE=$DATABRICKS_CFG_PATH
          echo "[DEFAULT]" > "$CONFIG_FILE"
          echo "host = ${{ secrets.DATABRICKS_HOST }}" >> "$CONFIG_FILE"
          echo "token = ${{ secrets.DATABRICKS_TOKEN }}" >> "$CONFIG_FILE"
          cat $DATABRICKS_CFG_PATH

          export BRANCH_NAME=$CI_BRANCH_NAME
          echo "BRANCH_NAME: $BRANCH_NAME"
          export USER_EMAIL=$GITHUB_USER_EMAIL
          echo "USER_EMAIL: $USER_EMAIL"
          export USER_NAME=$(echo $USER_EMAIL cut -d '@' -f 1 | tr '.' '_')
          echo "USER_NAMEL: $USER_NAME"

