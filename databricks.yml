bundle:
  name: data_contracts

include:
  - resources/workflows/*.yml

variables:
  branch_name:
    default: default
    description: Default branch name
  user_name:
    default: default
    description: Default user name
  user_email:
    default: default
    description: Default user email
  odcs_contract_source_catalog:
    default: default
    description: Default ODCS source catalog
  odcs_contract_source_schema:
    default: default
    description: Default ODCS source schema
  odcs_contract_target_schema:
    default: default
    description: Default ODCS target schema

targets:

  dev:
    git:
      branch: ${var.branch_name}
    default: true
    presets:
      name_prefix: ${var.user_name}_
      pipelines_development: true
      trigger_pause_status: UNPAUSED
    workspace:
      host: https://adb-5809742986594827.7.azuredatabricks.net
      root_path: /Workspace/Users/${var.user_email}/.bundle/${bundle.name}
    run_as:
      user_name: ${var.user_email}
  
  test:
    git:
      branch: test
    mode: testing
    workspace:
      host: https://adb-5809742986594827.7.azuredatabricks.net
      root_path: /Workspace/Users/${var.user_email}/.bundle/${bundle.name}
    permissions:
      - user_name: ${var.user_email}
        level: CAN_MANAGE
    run_as:
      user_name: ${var.user_email}

  prod:
    git:
      branch: main
    mode: production
    workspace:
      host: https://adb-5809742986594827.7.azuredatabricks.net
      root_path: /Workspace/Users/${var.user_email}/.bundle/${bundle.name}
    permissions:
      - user_name: ${var.user_email}
        level: CAN_MANAGE
    run_as:
      user_name: ${var.user_email}